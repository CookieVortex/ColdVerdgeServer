services:
  postgres:
    image: postgres:18
    container_name: coldverdge-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: coldverdge_dev
      POSTGRES_USER: coldverdge_dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - coldverdge_pgdata:/var/lib/postgresql

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U coldverdge_dev -d coldverdge_dev
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  coldverdge_pgdata: